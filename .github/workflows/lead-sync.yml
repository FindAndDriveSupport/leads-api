name: Lead Sync - Seriti → Kredo → HubSpot
on:
  schedule:
    - cron: "*/5 * * * *" # Every 5 minutes
  workflow_dispatch: # Allow manual trigger from GitHub UI
jobs:
  sync-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 4 # Safety: kill before next run starts
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore processed IDs cache
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: processed-leads.json
          key: processed-leads-cache

      - name: Run lead sync
        env:
          SERITI_API_KEY: ${{ secrets.SERITI_API_KEY }}
          SERITI_API_SECRET: ${{ secrets.SERITI_API_SECRET }}
          SERITI_DEALERSHIP_ID: ${{ secrets.SERITI_DEALERSHIP_ID }}
          KREDO_USERNAME: ${{ secrets.KREDO_USERNAME }}
          KREDO_PASSWORD: ${{ secrets.KREDO_PASSWORD }}
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          KREDO_X_API_KEY: ${{ secrets.KREDO_X_API_KEY }}
        run: |
          node --version
          node sync.js

      - name: Save processed IDs cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: processed-leads.json
          key: processed-leads-cache
